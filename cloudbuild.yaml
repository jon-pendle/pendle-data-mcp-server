steps:
  # 1. Initialize the boros-kb submodule into the build context.
  #    Auth: a read-only GitHub deploy key registered on
  #    pendle-finance/boros-knowledge-base; private half stored as
  #    BOROS_KB_DEPLOY_KEY in Secret Manager and injected below.
  - name: 'gcr.io/cloud-builders/git'
    id: init-submodules
    entrypoint: bash
    secretEnv: ['DEPLOY_KEY']
    args:
      - -c
      - |
        set -e
        mkdir -p /root/.ssh
        printf '%s\n' "$$DEPLOY_KEY" > /root/.ssh/id_ed25519
        chmod 600 /root/.ssh/id_ed25519
        ssh-keyscan -t ed25519 github.com >> /root/.ssh/known_hosts 2>/dev/null
        git submodule update --init --recursive

  # 2. Build the container image tagged with the commit SHA.
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - 'build'
      - '-t'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run/pendle-mcp-server:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # 3. Push image so Cloud Run can pull before the run-deploy step.
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - 'push'
      - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run/pendle-mcp-server:$SHORT_SHA'

  # 4. Roll out a new Cloud Run revision. Flags mirror deploy.sh.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: run-deploy
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'p-data-mcp-server'
      - '--image=asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run/pendle-mcp-server:$SHORT_SHA'
      - '--region=asia-southeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1024Mi'
      - '--cpu=1'
      - '--max-instances=1'
      - '--min-instances=1'
      - '--no-cpu-throttling'
      - '--timeout=3600'
      - '--service-account=p-data-mcp-server@pendle-data.iam.gserviceaccount.com'
      - '--set-env-vars=GOOGLE_OAUTH_CLIENT_ID=756482294543-flqkea2lpkugufl15rh7tjne6mjcbif7.apps.googleusercontent.com,MCP_SERVER_BASE_URL=https://p-data-mcp-server-7vz6iynqna-as.a.run.app,QA_SERVICE_URL=https://llm-service-qa-7vz6iynqna-uc.a.run.app'
      - '--set-secrets=GOOGLE_OAUTH_CLIENT_SECRET=JONJON_MCP_OAUTH_CLIENT_SECRET:latest'

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/BOROS_KB_DEPLOY_KEY/versions/latest
      env: DEPLOY_KEY

images:
  - 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/cloud-run/pendle-mcp-server:$SHORT_SHA'

options:
  dynamic_substitutions: true
  # Custom service account builds must specify a log destination.
  logging: CLOUD_LOGGING_ONLY
